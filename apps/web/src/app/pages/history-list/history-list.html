<h1>{{ 'history.title' | loc : locale.uiLang() }}</h1>

@if (sessions().length === 0) {
  <p>{{ 'history.empty' | loc : locale.uiLang() }}</p>
} @else {
  @for (s of sessions(); track s.id) {
    <mat-card class="row">
      <mat-card-content>
        <div class="meta">
          <a [routerLink]="['/history', s.id]" class="title">{{ s.title }}</a>
          <span class="date">{{ formatDate(s.updatedAt) }}</span>
        </div>
        <div class="actions">
          <vb-chip
            class="vers-chip"
            [label]="('history.versions' | loc : locale.uiLang()) + ': ' + s.versions.length"
          />
          <vb-button
            variant="outlined"
            color="warn"
            type="button"
            iconClass="bx bx-trash"
            [label]="'history.delete' | loc : locale.uiLang()"
            (click)="remove(s.id, $event)"
          />
          <vb-button
            variant="filled"
            color="primary"
            type="button"
            [label]="'history.open' | loc : locale.uiLang()"
            (click)="openSession(s.id)"
          />
        </div>
      </mat-card-content>
    </mat-card>
  }
}

<h1>{{ t('history.title') }}</h1>

@if (sessions().length === 0) {
  <p>{{ t('history.empty') }}</p>
} @else {
  @for (s of sessions(); track s.id) {
    <mat-card class="row">
      <mat-card-content>
        <div class="meta">
          <a [routerLink]="['/history', s.id]" class="title">{{ s.title }}</a>
          <span class="date">{{ formatDate(s.updatedAt) }}</span>
        </div>
        <div class="actions">
          <span class="vers">{{ t('history.versions') }}: {{ s.versions.length }}</span>
          <vb-button variant="outlined" type="button" [label]="t('history.delete')" (click)="remove(s.id, $event)" />
          <vb-button
            variant="filled"
            color="primary"
            type="button"
            [label]="t('history.open')"
            (click)="openSession(s.id)"
          />
        </div>
      </mat-card-content>
    </mat-card>
  }
}

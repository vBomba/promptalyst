<h1>{{ 'templates.title' | loc : locale.uiLang() }}</h1>
<p>{{ 'templates.hint' | loc : locale.uiLang() }}</p>
<p class="subhint">{{ 'templates.langHint' | loc : locale.uiLang() }}</p>

<div class="toolbar">
  <vb-button
    variant="filled"
    color="primary"
    type="button"
    iconClass="bx bx-plus"
    [label]="'templates.add' | loc : locale.uiLang()"
    (click)="addTemplate()"
  />
  <vb-button
    variant="text"
    type="button"
    iconClass="bx bx-refresh"
    [label]="'templates.reset' | loc : locale.uiLang()"
    (click)="resetAll()"
  />
</div>

<div class="grid">
  @for (tmpl of store.list(); track tmpl.id) {
    <mat-card>
      <mat-card-header>
        <mat-card-title>{{ 'templates.cardTitle' | loc : locale.uiLang() }} · {{ tmpl.id }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <vb-input
          class="full-vb"
          [placeholder]="'templates.editTitle' | loc : locale.uiLang()"
          [value]="titleDraft()[tmpl.id]"
          (valueChange)="onTitleChange(tmpl.id, $event)"
          [ariaLabel]="'templates.editTitle' | loc : locale.uiLang()"
        />
        <vb-textarea
          class="full-vb"
          [rows]="10"
          [counter]="true"
          [maxLength]="32000"
          [placeholder]="'templates.editBody' | loc : locale.uiLang()"
          [value]="bodyDraft()[tmpl.id]"
          (valueChange)="onBodyChange(tmpl.id, $event)"
          [ariaLabel]="'templates.editBody' | loc : locale.uiLang()"
        />
        <div class="card-actions">
          <vb-button
            variant="elevated"
            color="primary"
            type="button"
            iconClass="bx bx-right-arrow-alt"
            [label]="'templates.openAnalyzer' | loc : locale.uiLang()"
            (click)="openInAnalyzer(tmpl.id)"
          />
          <vb-button
            variant="outlined"
            color="warn"
            type="button"
            iconClass="bx bx-trash"
            [label]="'templates.delete' | loc : locale.uiLang()"
            (click)="removeTemplate(tmpl.id)"
          />
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>

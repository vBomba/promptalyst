<h1>{{ t('templates.title') }}</h1>
<p>{{ t('templates.hint') }}</p>
<p class="subhint">{{ t('templates.langHint') }}</p>

<div class="toolbar">
  <button mat-flat-button color="primary" type="button" (click)="addTemplate()">{{ t('templates.add') }}</button>
  <button mat-stroked-button type="button" (click)="resetAll()">{{ t('templates.reset') }}</button>
</div>

<div class="grid">
  @for (tmpl of store.list(); track tmpl.id) {
    <mat-card>
      <mat-card-header>
        <mat-card-title>{{ t('templates.cardTitle') }} · {{ tmpl.id }}</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-form-field appearance="outline" class="full eco-field" subscriptSizing="dynamic">
          <mat-label>{{ t('templates.editTitle') }}</mat-label>
          <input
            matInput
            [ngModel]="titleDraft()[tmpl.id]"
            (ngModelChange)="patchTitle(tmpl.id, $event)"
            (blur)="saveTitle(tmpl.id)"
          />
        </mat-form-field>
        <mat-form-field appearance="outline" class="full eco-field" subscriptSizing="dynamic">
          <mat-label>{{ t('templates.editBody') }}</mat-label>
          <textarea
            matInput
            rows="10"
            [ngModel]="bodyDraft()[tmpl.id]"
            (ngModelChange)="patchBody(tmpl.id, $event)"
            (blur)="saveBody(tmpl.id)"
          ></textarea>
        </mat-form-field>
        <div class="card-actions">
          <button mat-flat-button color="primary" type="button" (click)="openInAnalyzer(tmpl.id)">
            {{ t('templates.openAnalyzer') }}
          </button>
          <button mat-stroked-button type="button" class="btn-template-delete" (click)="removeTemplate(tmpl.id)">
            {{ t('templates.delete') }}
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>

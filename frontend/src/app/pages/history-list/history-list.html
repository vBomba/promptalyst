<h1>{{ t('history.title') }}</h1>

@if (sessions().length === 0) {
  <p>{{ t('history.empty') }}</p>
} @else {
  @for (s of sessions(); track s.id) {
    <mat-card class="row">
      <mat-card-content>
        <div class="meta">
          <a [routerLink]="['/history', s.id]" class="title">{{ s.title }}</a>
          <span class="date">{{ formatDate(s.updatedAt) }}</span>
        </div>
        <div class="actions">
          <span class="vers">{{ t('history.versions') }}: {{ s.versions.length }}</span>
          <button mat-stroked-button type="button" (click)="remove(s.id, $event)">{{ t('history.delete') }}</button>
          <a mat-flat-button color="primary" [routerLink]="['/history', s.id]">{{ t('history.open') }}</a>
        </div>
      </mat-card-content>
    </mat-card>
  }
}

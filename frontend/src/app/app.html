<header class="topbar">
  <a routerLink="/" class="brand">
    <span class="brand-title">{{ t('app.title') }}</span>
  </a>
  <span class="spacer"></span>
  <nav class="nav-links">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">{{ t('nav.analyzer') }}</a>
    <a routerLink="/history" routerLinkActive="active">{{ t('nav.history') }}</a>
    <a routerLink="/templates" routerLinkActive="active">{{ t('nav.templates') }}</a>
  </nav>
  <label class="sr-only" for="app-lang">{{ t('settings.language') }}</label>
  <select id="app-lang" class="filter-select lang-select" [value]="appLang()" (change)="setAppLang($any($event.target).value)">
    <option value="en">English</option>
    <option value="uk">Українська</option>
    <option value="pl">Polski</option>
  </select>
  <button
    type="button"
    class="theme-switch"
    [class.is-dark]="isDark()"
    (click)="toggleTheme()"
    [attr.aria-label]="t('nav.theme')"
  >
    <span class="theme-switch-track" aria-hidden="true"></span>
    <span class="theme-switch-knob">
      <i [class]="themeIconClass()" aria-hidden="true"></i>
    </span>
  </button>
</header>
<main class="page-shell">
  <router-outlet />
</main>
